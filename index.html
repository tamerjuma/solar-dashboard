<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISOFT Solar System</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  background:#0b1220;
  color:#fff;
  font-family:'Segoe UI';
}
.container{max-width:1400px;margin:auto;padding:20px}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:#121a2b;
  padding:15px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.value{font-size:26px;font-weight:bold}
.icon{font-size:20px;margin-bottom:5px;color:#00e5ff}

.switch{
  width:55px;height:28px;background:#333;border-radius:20px;cursor:pointer;
}
.switch.on{background:#22c55e}

#map{height:300px;border-radius:12px}
</style>
</head>

<body>
<div class="container">

<h2><i class="fa-solid fa-solar-panel"></i> PRISOFT Solar Dashboard</h2>
<p id="status">Connecting...</p>

<div class="grid">

<div class="card"><div class="icon"><i class="fa-solid fa-bolt"></i></div><div id="v" class="value">--</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-plug"></i></div><div id="c" class="value">--</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-battery-full"></i></div><div id="b" class="value">--</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-temperature-half"></i></div><div id="t" class="value">--</div></div>

<div class="card"><div class="icon"><i class="fa-solid fa-gauge-high"></i></div><div id="p" class="value">--</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-house"></i></div><div id="l" class="value">--</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-clock"></i></div><div id="rt" class="value">--</div></div>
<div class="card"><div class="icon"><i class="fa-solid fa-chart-line"></i></div><div id="np" class="value">--</div></div>

</div>

<br>

<h3><i class="fa-solid fa-sliders"></i> Load Control</h3>
<div class="grid">
<div class="card">Load1 <div id="load1" class="switch"></div></div>
<div class="card">Load2 <div id="load2" class="switch"></div></div>
<div class="card">Load3 <div id="load3" class="switch"></div></div>
</div>

<br>

<h3><i class="fa-solid fa-triangle-exclamation"></i> Alerts</h3>
<div id="alerts"></div>

<br>

<h3><i class="fa-solid fa-chart-line"></i> Energy Chart</h3>
<canvas id="chart"></canvas>

<br>

<h3><i class="fa-solid fa-map-location-dot"></i> System Location</h3>
<div id="map"></div>

</div>

<script type="module">

const DEVICE = "ESP32-SOLAR-01";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCu7kII41Ru2bHHfxuRz0LL3nAM9syXCPs",
  authDomain: "smart-solar-energy-80b88.firebaseapp.com",
  databaseURL: "https://smart-solar-energy-80b88-default-rtdb.firebaseio.com",
  projectId: "smart-solar-energy-80b88",
  storageBucket: "smart-solar-energy-80b88.firebasestorage.app",
  messagingSenderId: "760586246522",
  appId: "1:760586246522:web:27e7b46d498085bcdf9ec3",
  measurementId: "G-6CPKBM5GVQ" 
};

const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js");
const { getDatabase, ref, onValue, update } = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js");

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Chart
const labels=[], prod=[], cons=[];
const chart = new Chart(document.getElementById("chart"),{
  type:'line',
  data:{labels,datasets:[
    {label:'Production',data:prod},
    {label:'Consumption',data:cons}
  ]}
});

// Map
const map = L.map('map').setView([31.95,35.23], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const marker = L.marker([31.95,35.23]).addTo(map);
// DOM Elements (مهم جداً)
const status = document.getElementById("status");

const v = document.getElementById("v");
const c = document.getElementById("c");
const b = document.getElementById("b");
const t = document.getElementById("t");

const p = document.getElementById("p");
const l = document.getElementById("l");
const rt = document.getElementById("rt");
const np = document.getElementById("np");

const alerts = document.getElementById("alerts");
// Firebase
onValue(ref(db,`devices/${DEVICE}/live`),(snap)=>{

if(!snap.exists()) return;

const d = snap.val();

status.innerText="Firebase Live";

// calculations
let voltage = d.solarVoltage || 0;
let current = d.solarCurrent || 0;
let load = d.loadPower || 0;
let battery = d.batteryPercent || 0;
let temp = d.temperature || 0;

let power = voltage * current;
let net = power - load;
let remaining = load > 0 ? ((battery / 100) * 1000 / load) : 0;

// UI
v.innerText = d.solarVoltage+" V";
c.innerText = d.solarCurrent+" A";
b.innerText = d.batteryPercent+" %";
t.innerText = d.temperature+" °C";

p.innerText = power.toFixed(0)+" W";
l.innerText = d.loadPower+" W";
rt.innerText = remaining.toFixed(1)+" h";
np.innerText = net.toFixed(0)+" W";

// chart
labels.push(new Date().toLocaleTimeString());
prod.push(power);
cons.push(d.loadPower);

if(labels.length>20){
labels.shift();prod.shift();cons.shift();
}
chart.update();

// switches
setSwitch("load1",d.load1);
setSwitch("load2",d.load2);
setSwitch("load3",d.load3);

// alerts
let html="";
if(d.batteryPercent<20) html+="<p style='color:red'>Battery Critical</p>";
else if(d.batteryPercent<40) html+="<p style='color:orange'>Battery Low</p>";
else html+="<p style='color:green'>Battery Good</p>";

if(d.temperature>45) html+="<p style='color:red'>High Temperature</p>";
if(d.loadPower>power) html+="<p style='color:orange'>Overload</p>";

alerts.innerHTML=html;

});

// control
function setSwitch(id,state){
let el=document.getElementById(id);
el.classList.toggle("on",state);

el.onclick=()=>{
let newState=!el.classList.contains("on");
el.classList.toggle("on",newState);

update(ref(db,`devices/${DEVICE}/commands`),{
[id]:newState
});
};
}

</script>

</body>
</html>
